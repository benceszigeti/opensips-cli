# OpenSIPS CLI Configuration File
# This file contains the default configuration for OpenSIPS CLI

[default]
# CLI Settings
prompt_name = opensips-cli
prompt_intro = OpenSIPS CLI - Java Port\nType 'help' for available commands.
prompt_emptyline_repeat_cmd = false
history_file = ~/.opensips-cli.history
history_file_size = 1000
log_level = WARNING

# Communication Settings
communication_type = http
url = http://127.0.0.1:8888/mi

# FIFO Settings (for fifo communication type)
fifo_file = /var/run/opensips/opensips_fifo
fifo_file_fallback = /tmp/opensips_fifo
fifo_reply_dir = /tmp

# Datagram Settings (for datagram communication type)
datagram_ip = 127.0.0.1
datagram_port = 8080
datagram_unix_socket = /tmp/opensips.sock

[production]
# Production instance configuration
communication_type = http
url = http://production-server:8888/mi
log_level = INFO

[development]
# Development instance configuration
communication_type = http
url = http://localhost:8888/mi
log_level = DEBUG